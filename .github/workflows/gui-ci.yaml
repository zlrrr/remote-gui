name: gui CI

on:
  push:
    paths:
      - "gui/**"
      - ".github/workflows/gui-ci.yaml"
  pull_request:
    paths:
      - "gui/**"
      - ".github/workflows/gui-ci.yaml"

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: gui
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: gui/go.sum
      - name: Run tests
        run: go test ./... -v -race -timeout 60s -coverprofile=coverage.out
      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: gui/coverage.out

  # ── Primary deliverable: Windows desktop GUI (Fyne + CGO) ──────────────────
  build-windows-fyne-gui:
    name: Build Windows Fyne GUI (amd64)
    needs: test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      # Provide x86_64 MinGW-w64 gcc so CGO can cross-compile Fyne for Windows
      - name: Set up MSYS2 / MinGW-w64
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: false
          install: mingw-w64-x86_64-gcc
          # Inject MINGW64 bin into the standard Windows PATH so `go build` finds gcc
          path-type: inherit

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: gui/go.sum

      - name: Add Fyne dependency and resolve all transitive deps
        working-directory: gui
        run: |
          go get fyne.io/fyne/v2@latest
          go mod tidy

      - name: Build Fyne GUI exe
        working-directory: gui
        env:
          CGO_ENABLED: "1"
          # -H=windowsgui: suppress the console window so only the Fyne window appears
        run: go build -tags fyne -ldflags="-s -w -H=windowsgui" -o dist/remote-gui-windows-amd64.exe ./cmd/gui/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: remote-gui-windows-amd64
          path: gui/dist/remote-gui-windows-amd64.exe
          if-no-files-found: error

  # ── CLI mode builds (pure Go, no CGO, no Fyne) ─────────────────────────────
  build-cli:
    name: Build CLI (${{ matrix.goos }}/${{ matrix.goarch }})
    needs: test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            ext: ""
          - goos: linux
            goarch: arm64
            ext: ""
          - goos: windows
            goarch: amd64
            ext: ".exe"
    defaults:
      run:
        working-directory: gui
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: gui/go.sum
      - name: Build CLI binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          go build -ldflags="-s -w" \
            -o dist/remote-gui-cli-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }} \
            ./cmd/gui/
      - uses: actions/upload-artifact@v4
        with:
          name: remote-gui-cli-${{ matrix.goos }}-${{ matrix.goarch }}
          path: gui/dist/

  # ── Web Client builds (pure Go, no CGO, embedded web UI) ──────────────────
  build-webclient:
    name: Build Web Client (${{ matrix.goos }}/${{ matrix.goarch }})
    needs: test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: windows
            goarch: amd64
            ext: ".exe"
          - goos: linux
            goarch: amd64
            ext: ""
          - goos: darwin
            goarch: amd64
            ext: ""
    defaults:
      run:
        working-directory: gui
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: gui/go.sum
      - name: Build web client binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          go build -ldflags="-s -w" \
            -o dist/remote-gui-webclient-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }} \
            ./cmd/webclient/
      - uses: actions/upload-artifact@v4
        with:
          name: remote-gui-webclient-${{ matrix.goos }}-${{ matrix.goarch }}
          path: gui/dist/remote-gui-webclient-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}
          if-no-files-found: error

  docker:
    needs: test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: gui
          file: gui/deployments/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository }}/remote-gui:latest
