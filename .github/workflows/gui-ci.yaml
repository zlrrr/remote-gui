name: gui CI

on:
  push:
    paths: ["gui/**"]
  pull_request:
    paths: ["gui/**"]

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: gui
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - name: Run tests
        run: go test ./... -v -race -timeout 60s -coverprofile=coverage.out
      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: gui/coverage.out

  build:
    needs: test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        os: [linux, darwin, windows]
        arch: [amd64, arm64]
    defaults:
      run:
        working-directory: gui
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - name: Build binary (CLI mode)
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
        run: |
          go build -ldflags="-s -w" \
            -o dist/remote-gui-${{ matrix.os }}-${{ matrix.arch }} \
            ./cmd/gui/
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: remote-gui-${{ matrix.os }}-${{ matrix.arch }}
          path: gui/dist/

  docker:
    needs: test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: gui
          file: gui/deployments/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository }}/remote-gui:latest
